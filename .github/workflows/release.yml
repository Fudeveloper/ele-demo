name: Release (Electron)

# 打 tag (v*) 时触发：构建 Windows 安装包并发布到 GitHub Releases。
# electron-updater 通过 latest.yml 检查更新，因此必须发布该文件。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build & Publish to GitHub Releases
        env:
          # 使用内置 GITHUB_TOKEN 即可发布到自己仓库的 Releases
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 从当前仓库自动推断 owner / repo，无需手动配置 quasar.config.ts
          GH_OWNER: ${{ github.repository_owner }}
          GH_REPO: ${{ github.event.repository.name }}
        # -P always 透传给 electron-builder，与 publish 配置配合自动上传
        # latest.yml 与安装包到 GitHub Releases
        run: pnpm build -m electron -P always
