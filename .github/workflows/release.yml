name: Release (Electron)

# 打 tag (v*) 时触发：构建 Windows 安装包并发布到 GitHub Releases。
# electron-updater 通过 latest.yml 检查更新，因此必须发布该文件。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Electron app
        run: pnpm build -m electron

      - name: Publish to GitHub Releases
        env:
          # 使用内置 GITHUB_TOKEN 即可发布到自己仓库的 Releases
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec electron-builder --publish always
